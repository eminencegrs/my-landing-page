<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dariien.co | Coming Soon</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-1: #38bdf8;
            --accent-2: #818cf8;
            --line-color: rgba(56, 189, 248, 0.05); /* Subtle lines */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Abstract Flowing Lines Background */
        .background-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(0deg, transparent 24%, var(--line-color) 25%, var(--line-color) 26%, transparent 27%, transparent 74%, var(--line-color) 75%, var(--line-color) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, var(--line-color) 25%, var(--line-color) 26%, transparent 27%, transparent 74%, var(--line-color) 75%, var(--line-color) 76%, transparent 77%, transparent);
            background-size: 80px 80px; /* Controls the grid size */
            animation: flow 60s linear infinite;
        }

        /* Animation for the lines */
        @keyframes flow {
            from { background-position: 0 0; }
            to { background-position: 800px 800px; } /* Move diagonally */
        }

        /* Subtle overlay to fade the lines in and out */
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-color) 80%);
            animation: pulseFade 15s infinite alternate ease-in-out;
        }

        /* Animation to make the lines disappear slowly */
        @keyframes pulseFade {
            0% { opacity: 0.2; }
            50% { opacity: 0.6; }
            100% { opacity: 0.2; }
        }

        .container {
            text-align: center;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.02);
            padding: 3.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            z-index: 10;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin: 0;
            background: linear-gradient(to bottom right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a1a1aa;
            font-size: 1.15rem;
            margin-top: 1.2rem;
            font-weight: 300;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(56, 189, 248, 0.08);
            color: var(--accent-1);
            padding: 0.6rem 1.2rem;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 2.5rem;
            border: 1px solid rgba(56, 189, 248, 0.15);
        }

        .dot {
            width: 9px;
            height: 9px;
            background-color: var(--accent-1);
            border-radius: 50%;
            position: relative;
        }

        /* Pulsing dot animation */
        .dot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: var(--accent-1);
            animation: pulseDot 2s infinite;
        }

        @keyframes pulseDot {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="background-lines"></div>
    <div class="background-overlay"></div>
    
    <div class="container">
        <h1>dariien.co</h1>
        <div class="status-badge">
            <span class="dot"></span>
            Online
        </div>
    </div>
</body>
</html>
