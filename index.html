<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dariien.co | Online</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-1: #38bdf8;
            --line-color: rgba(56, 189, 248, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Abstract Flowing Lines Background */
        .background-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(0deg, transparent 24%, var(--line-color) 25%, var(--line-color) 26%, transparent 27%, transparent 74%, var(--line-color) 75%, var(--line-color) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, var(--line-color) 25%, var(--line-color) 26%, transparent 27%, transparent 74%, var(--line-color) 75%, var(--line-color) 76%, transparent 77%, transparent);
            background-size: 80px 80px;
            animation: flow 60s linear infinite;
        }

        @keyframes flow {
            from { background-position: 0 0; }
            to { background-position: 800px 800px; }
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-color) 80%);
            animation: pulseFade 15s infinite alternate ease-in-out;
        }

        @keyframes pulseFade {
            0% { opacity: 0.2; }
            50% { opacity: 0.6; }
            100% { opacity: 0.2; }
        }

        /* Minimalist Container - No Borders/Background */
        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin: 0;
            background: linear-gradient(to bottom right, #fff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: var(--accent-1);
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 1rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* Corner Visitor Info Style */
        .visitor-info {
            position: absolute;
            bottom: 20px;
            right: 25px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.7rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            z-index: 20;
            text-align: right;
            line-height: 1.6;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-1);
            border-radius: 50%;
            position: relative;
        }

        .dot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: var(--accent-1);
            animation: pulseDot 2.5s infinite;
        }

        @keyframes pulseDot {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="background-lines"></div>
    <div class="background-overlay"></div>
    
    <div class="container">
        <h1>dariien.co</h1>
        <div class="status-badge">
            <span class="dot"></span>
            Online
        </div>
    </div>

    <div class="visitor-info" id="visitor-stats">Connecting...</div>

    <script>
        // Fetch visitor data via public API
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                if (data.ip) {
                    const info = `
                        IP: ${data.ip}<br>
                        LOC: ${data.city}, ${data.country_code}
                    `;
                    document.getElementById('visitor-stats').innerHTML = info;
                }
            })
            .catch(() => {
                // Silently hide if blocked by ad-blocker
                document.getElementById('visitor-stats').style.display = 'none';
            });
    </script>
</body>
</html>
